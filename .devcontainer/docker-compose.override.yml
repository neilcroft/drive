services:
  app-dev:
    environment:
      HOME: /tmp/dev-home
    command:
      - sh
      - -c
      - "mkdir -p /tmp/dev-home && sed 's|/sbin/nologin|/bin/sh|' /etc/passwd > /tmp/passwd && cat /tmp/passwd > /etc/passwd && rm /tmp/passwd && exec sleep infinity"
    volumes:
      - ..:/workspace:cached
